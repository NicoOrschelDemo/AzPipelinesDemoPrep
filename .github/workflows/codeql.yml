# Migrated from azure-pipelines-codeql.yml
# Azure DevOps Advanced Security CodeQL tasks → github/codeql-action (v4)
#
# Task mappings:
#   AdvancedSecurity-Codeql-Init@1     → github/codeql-action/init
#   AdvancedSecurity-Codeql-Autobuild@1 → github/codeql-action/autobuild
#   AdvancedSecurity-Codeql-Analyze@1  → github/codeql-action/analyze
#   NodeTool@0                         → actions/setup-node
#   pool: vmImage: windows-latest      → runs-on: windows-latest
#   trigger/pr: [main]                 → on: push/pull_request: branches: [main]
#   advancedsecurity.submittoadvancedsecurity: true → implicit (GHAS always receives results)
#   enableAutomaticCodeQLInstall: true  → not needed; CodeQL is built into github/codeql-action
#   WaitForProcessing: true            → not needed; GitHub processes SARIF results asynchronously

name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  security-events: write  # Required to upload SARIF results to GitHub Advanced Security
  actions: read
  contents: read

jobs:
  analyze:
    name: Build on Windows
    runs-on: windows-latest

    env:
      # Preserved from original Azure DevOps pipeline variable declarations
      BuildConfiguration: Release
      BuildPlatform: any cpu

    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # NodeTool@0 (versionSpec: 10.16.3) → actions/setup-node v6.4.0
      - name: Use Node 10.16.3
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '10.16.3'

      # DotNetCoreCLI@2 (restore) → actions/setup-dotnet + dotnet restore
      # actions/setup-dotnet v5.4.0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1

      # AdvancedSecurity-Codeql-Init@1 → github/codeql-action/init v4.36.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: csharp, javascript
          queries: security-extended
      
      # AdvancedSecurity-Codeql-Autobuild@1 → github/codeql-action/autobuild v4.36.2
      #- name: Autobuild
      #  uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
      
      # DotNetCoreCLI@2 supports glob expansion internally; replicate with PowerShell Get-ChildItem
      - name: Restore
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter "*.csproj" | ForEach-Object {
            dotnet restore $_.FullName
          }
          
      # DotNetCoreCLI@2 (build) → dotnet build
      - name: Build
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter "*.csproj" | ForEach-Object {
            dotnet build $_.FullName --configuration ${{ env.BUILD_CONFIGURATION }}
          }
            
      # AdvancedSecurity-Codeql-Analyze@1 → github/codeql-action/analyze v4.36.2
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e

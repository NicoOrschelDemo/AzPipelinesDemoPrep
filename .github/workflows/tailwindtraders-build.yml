# Migrated from Azure DevOps tailwindtraders-build.yml
# Original source archived at: .github/ci-archive/tailwindtraders-build.yml
# Migration date: 2025

name: TailwindTraders Build

on:
  push:
    branches:
      - main

env:
  BUILD_CONFIGURATION: Release
  # BuildPlatform: "any cpu" — not required for dotnet CLI commands
  MAJOR_VERSION: "2"
  MINOR_VERSION: "0"

jobs:
  # Converted from: stages[0] - Build stage, job: "Build on Windows"
  # pool: vmImage: windows-latest => runs-on: windows-latest
  build:
    name: Build on Windows
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-node v6.4.0
      # Converted from: NodeTool@0 versionSpec: 10.16.3
      - name: Use Node 10.16.3
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '10.16.3'

      # actions/setup-dotnet v5.4.0
      # Converted from: UseDotNet@2 packageType: sdk, version: 5.x
      - name: Setup .NET SDK 5.x
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: '5.x'

      # Converted from: Npm@1 workingDir: TailwindTraders.Website/Source/Tailwind.Traders.Web/ClientApp
      - name: npm install
        working-directory: TailwindTraders.Website/Source/Tailwind.Traders.Web/ClientApp
        run: npm install

      # Converted from: DotNetCoreCLI@2 command: restore, projects: **/*.csproj
      # Using solution file for reliable glob handling on Windows runners
      - name: Restore
        shell: pwsh
        run: dotnet restore TailwindTraders.Website/Source/Tailwind.Traders.Web.sln

      # Compute build version from major/minor/run_number
      # Converted from: Azure DevOps pipeline name $(MajorVersion).$(MinorVersion).$(Rev:r)
      # Note: github.run_number is a global monotonic counter; unlike ADO's $(Rev:r),
      # it does not reset when major/minor changes.
      - name: Compute build version
        shell: pwsh
        run: |
          $buildVersion = "$env:MAJOR_VERSION.$env:MINOR_VERSION.${{ github.run_number }}"
          "BUILD_VERSION=$buildVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # Converted from: powershell step - Generate AssemblyInfo.cs
      - name: Generate AssemblyInfo.cs
        shell: pwsh
        run: |
          $project = "${{ github.workspace }}\TailwindTraders.Website\Source\Tailwind.Traders.Web"
          $version = $env:BUILD_VERSION

          @"
          using System.Reflection;

          [assembly: AssemblyVersion("$version")]
          [assembly: AssemblyFileVersion("$version")]
          [assembly: AssemblyInformationalVersion("$version")]
          "@ | Set-Content (Join-Path $project "GeneratedAssemblyInfo.cs")

      # mingjun97/file-regex-replace v1
      # Converted from: VersionAssemblies@2
      #   filePattern: **/AssemblyInfo.cs
      #   versionSource: buildNumber, versionFormat: threeParts, replaceVersionFormat: threeParts
      # Updates all three assembly version attributes in existing AssemblyInfo.cs files
      - name: Version Assemblies
        uses: mingjun97/file-regex-replace@7d8ae0144cd6660fe8ca5a938ae71ea816a06f47
        with:
          regex: '(Assembly(?:Version|FileVersion|InformationalVersion)\(")[^"]*(")'
          replacement: '$1${{ env.BUILD_VERSION }}$2'
          flags: 'g'
          include: '(AssemblyInfo\.cs)'

      # Converted from: DotNetCoreCLI@2 command: build, projects: **/*.csproj
      - name: Build
        shell: pwsh
        run: >
          dotnet build TailwindTraders.Website/Source/Tailwind.Traders.Web.sln
          --configuration $env:BUILD_CONFIGURATION

      # Note: AdvancedSecurity-Dependency-Scanning@1 and AdvancedSecurity-Publish@1
      # These Azure DevOps Advanced Security tasks scan dependencies and publish SARIF
      # results to ADO Advanced Security. On GitHub, this functionality is provided
      # natively by GitHub Advanced Security (GHAS) — dependency scanning runs
      # automatically when GHAS is enabled under Settings > Security & analysis.
      # No explicit workflow step is needed.

      # Converted from: DotNetCoreCLI@2 command: test, projects: **/*[Tt]ests/*.csproj
      # Using solution file to reliably run all tests on Windows runners
      - name: Test
        shell: pwsh
        run: >
          dotnet test TailwindTraders.Website/Source/Tailwind.Traders.Web.sln
          --configuration $env:BUILD_CONFIGURATION

  # Converted from: stages[1] - Deploy_Server stage
  # dependsOn: Build + condition: succeeded() => needs: build (default success gate)
  deploy-server:
    name: Deploy Server
    runs-on: windows-latest
    needs: build
    environment: prod_server
    permissions:
      contents: read

    steps:
      # Converted from: deployment job with environment: prod_server, strategy: runOnce
      # $(publishKey) variable migrated to GitHub Secret: PUBLISH_KEY
      - name: Deployment with secret
        run: echo "ServerDeployment with secret ${{ secrets.PUBLISH_KEY }}"

  # Converted from: stages[2] - Deploy_Client stage
  # dependsOn: [Build, Deploy_Server] + condition: succeeded() => needs: [build, deploy-server]
  deploy-client:
    name: Deploy Client
    runs-on: windows-latest
    needs: [build, deploy-server]
    environment: prod_client
    permissions:
      contents: read

    steps:
      # Converted from: deployment job with environment: prod_client, strategy: runOnce
      # $(publishKey) variable migrated to GitHub Secret: PUBLISH_KEY
      - name: Deployment with secret
        run: echo "Client Deployment with secret ${{ secrets.PUBLISH_KEY }}"

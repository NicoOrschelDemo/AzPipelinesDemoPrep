name: tailwindtraders-build

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  RESOURCE_GROUP: ghazdo-workshops
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: any cpu
  WEBAPP_NAME: tailwind-github-demo
  MAJOR_VERSION: '2'
  MINOR_VERSION: '0'

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js 10.16.3
        # actions/setup-node v6.4.0
        # Required to preserve compatibility with the original Azure DevOps pipeline.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 10.16.3

      - name: Setup .NET SDK 5.x
        # actions/setup-dotnet v5.4.0
        # Required to preserve compatibility with the original Azure DevOps pipeline.
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: 5.x

      - name: npm install
        working-directory: TailwindTraders.Website/Source/Tailwind.Traders.Web/ClientApp
        run: npm install

      - name: Compute build version
        shell: pwsh
        run: |
          $buildVersion = "$env:MAJOR_VERSION.$env:MINOR_VERSION.${{ github.run_number }}"
          "BUILD_VERSION=$buildVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Filter *.csproj | ForEach-Object {
            dotnet restore $_.FullName
          }

      - name: Generate AssemblyInfo.cs
        shell: pwsh
        run: |
          $project = Join-Path $env:GITHUB_WORKSPACE "TailwindTraders.Website\Source\Tailwind.Traders.Web"
          @"
          using System.Reflection;

          [assembly: AssemblyVersion("$env:BUILD_VERSION")]
          [assembly: AssemblyFileVersion("$env:BUILD_VERSION")]
          [assembly: AssemblyInformationalVersion("$env:BUILD_VERSION")]
          "@ | Set-Content (Join-Path $project "GeneratedAssemblyInfo.cs")

      - name: Update AssemblyInfo.cs version values
        # mingjun97/file-regex-replace v1
        uses: mingjun97/file-regex-replace@7d8ae0144cd6660fe8ca5a938ae71ea816a06f47
        with:
          regex: '(?m)^\[assembly:\s*(AssemblyVersion|AssemblyFileVersion|AssemblyInformationalVersion)\("[0-9A-Za-z\.-]*"\)\]$'
          replacement: '[assembly: $1("${{ env.BUILD_VERSION }}")]'
          include: 'AssemblyInfo\.cs$'
          path: '.'

      - name: Build
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Filter *.csproj | ForEach-Object {
            dotnet build $_.FullName --configuration $env:BUILD_CONFIGURATION
          }

      - name: Dependency scanning
        run: echo "Dependency scanning and dependency publication are provided by GitHub dependency graph and Dependabot alerts."

      - name: Test
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path . -Recurse -Filter *.csproj | Where-Object {
            $_.FullName -match '[\\/][Tt]ests[\\/]'
          }

          if ($testProjects.Count -eq 0) {
            Write-Host 'No test projects matched **/*[Tt]ests/*.csproj. Skipping test execution.'
            exit 0
          }

          $testProjects | ForEach-Object {
            dotnet test $_.FullName --configuration $env:BUILD_CONFIGURATION
          }

      - name: Deployment placeholder
        shell: pwsh
        env:
          PUBLISH_KEY: ${{ secrets.PUBLISH_KEY }}
        run: |
          if ([string]::IsNullOrEmpty($env:PUBLISH_KEY)) {
            Write-Host 'Deployment secret PUBLISH_KEY is not configured.'
            exit 0
          }
          Write-Host 'Deployment secret is configured.'

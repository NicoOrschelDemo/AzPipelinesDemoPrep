name: tailwindtraders-build

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  RESOURCE_GROUP: ghazdo-workshops
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: any cpu
  RESTORE_BUILD_PROJECTS: '**/*.csproj'
  TEST_PROJECTS: '**/*[Tt]ests/*.csproj'
  WEBAPP_NAME: tailwind-github-demo
  MAJOR_VERSION: '2'
  MINOR_VERSION: '0'

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-node v6.4.0
      - name: Use Node 10.16.3
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 10.16.3

      # actions/setup-dotnet v5.4.0
      - name: Setup .NET SDK 5.x
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: 5.x

      - name: npm install
        working-directory: TailwindTraders.Website/Source/Tailwind.Traders.Web/ClientApp
        run: npm install

      - name: Restore
        run: dotnet restore "${{ env.RESTORE_BUILD_PROJECTS }}"

      - name: Generate AssemblyInfo.cs
        shell: pwsh
        run: |
          $project = Join-Path $env:GITHUB_WORKSPACE "TailwindTraders.Website\Source\Tailwind.Traders.Web"
          $version = "$env:MAJOR_VERSION.$env:MINOR_VERSION.$env:GITHUB_RUN_NUMBER"
          @"
          using System.Reflection;

          [assembly: AssemblyVersion(""$version"")]
          [assembly: AssemblyFileVersion(""$version"")]
          [assembly: AssemblyInformationalVersion(""$version"")]
          "@ | Set-Content (Join-Path $project "GeneratedAssemblyInfo.cs")

      - name: Version assemblies
        shell: pwsh
        run: |
          $version = "$env:MAJOR_VERSION.$env:MINOR_VERSION.$env:GITHUB_RUN_NUMBER"
          Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter AssemblyInfo.cs -Recurse -File | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace 'AssemblyVersion\("[^"]*"\)', "AssemblyVersion(\"$version\")"
            $content = $content -replace 'AssemblyFileVersion\("[^"]*"\)', "AssemblyFileVersion(\"$version\")"
            $content = $content -replace 'AssemblyInformationalVersion\("[^"]*"\)', "AssemblyInformationalVersion(\"$version\")"
            Set-Content -Path $_.FullName -Value $content
          }

      - name: Build
        run: dotnet build "${{ env.RESTORE_BUILD_PROJECTS }}" --configuration "${{ env.BUILD_CONFIGURATION }}" --no-restore

      - name: Dependency scanning (.NET)
        run: dotnet list TailwindTraders.Website/Source/Tailwind.Traders.Web.sln package --vulnerable --include-transitive

      - name: Dependency scanning (npm)
        working-directory: TailwindTraders.Website/Source/Tailwind.Traders.Web/ClientApp
        run: npm audit --audit-level=high

      - name: Dependency publish
        run: echo "Dependency scanning results published in workflow logs."

      - name: Test
        run: dotnet test "${{ env.TEST_PROJECTS }}" --configuration "${{ env.BUILD_CONFIGURATION }}" --no-build

      - name: Deployment placeholder
        run: echo "Deployment with secret ${{ secrets.PUBLISH_KEY }}"

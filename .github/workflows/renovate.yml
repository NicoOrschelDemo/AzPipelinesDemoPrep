# Migrated from azure-pipelines_renovate.yml
# Original: Azure Pipelines – Renovate pipeline

name: Renovate

on:
  push:
    branches:
      - main
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: TailwindTraders.Website/Source

jobs:
  renovate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: dotnet build ${{ env.BUILD_CONFIGURATION }}
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ env.BUILD_CONFIGURATION }}

      # NOTE: AdvancedSecurity-Dependency-Scanning@1 has no direct workflow equivalent.
      # GitHub handles dependency scanning natively via Dependabot alerts and the
      # dependency graph. Enable these in repository Settings → Security & analysis.

      # NOTE: BuildQualityChecks@9 has no direct GitHub Actions equivalent.
      # Enforce warning thresholds via branch protection rules or custom scripts.

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Run Renovate
        uses: renovatebot/github-action@v41
        with:
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
